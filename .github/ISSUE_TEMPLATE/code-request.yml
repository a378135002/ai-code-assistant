---
name: 💻 代码需求
description: 提交你的代码开发需求，我会自动评估并报价
title: "[需求] 请简要描述你的需求"
labels: ["enhancement", "client-request"]
body:
  - type: markdown
    attributes:
      value: |
        ## 📋 需求提交表单
        
        请填写以下信息，我会尽快评估并报价！
        
  - type: textarea
    id: description
    attributes:
      label: 📝 需求描述
      description: 详细描述你需要什么功能
      placeholder: |
        例：我需要一个 Python 脚本，可以批量下载网页上的图片...
    validations:
      required: true
      
  - type: textarea
    id: requirements
    attributes:
      label: ✅ 具体要求
      description: 列出具体功能点和技术要求
      placeholder: |
        1. 支持批量下载
        2. 可以指定保存路径
        3. 支持多线程加速
        4. ...
    validations:
      required: true
      
  - type: dropdown
    id: language
    attributes:
      label: 💻 期望的编程语言
      description: 如果没有特别要求，我会选择最合适的
      options:
        - Python（推荐）
        - JavaScript/Node.js
        - TypeScript
        - Go
        - Java
        - 其他（请说明）
        - 无特别要求
    validations:
      required: false
      
  - type: dropdown
    id: urgency
    attributes:
      label: ⏰ 紧急程度
      description: 你希望多久完成？
      options:
        - 普通（1-3 天）
        - 加急（24 小时内）+¥100
        - 特急（4 小时内）+¥300
    validations:
      required: true
      
  - type: dropdown
    id: budget
    attributes:
      label: 💰 预算范围
      description: 你的预算是多少？
      options:
        - ¥100 以内
        - ¥100-300
        - ¥300-500
        - ¥500-1000
        - ¥1000+
        - 按实际评估
    validations:
      required: true
      
  - type: textarea
    id: examples
    attributes:
      label: 🔗 参考示例（可选）
      description: 如果有类似的项目或代码，可以贴链接
      placeholder: |
        例：类似这个功能 https://github.com/xxx/xxx
    validations:
      required: false
      
  - type: textarea
    id: additional
    attributes:
      label: 📎 补充说明（可选）
      description: 其他想说明的信息
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: ⚠️ 服务条款
      description: 提交即表示你同意以下条款
      options:
        - label: 我理解这是一个 AI 自动化服务，代码质量有保障但需要自行测试
          required: true
        - label: 我理解报价后需要付款才会开始开发
          required: true
        - label: 我理解交付后有 7 天免费修改期
          required: true
